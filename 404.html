  <!-- Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: { 600: '#0284c7', 700: '#0369a1', 900: '#0c4a6e' },
            accent: { teal: '#14b8a6' },
            dark: { 900: '#0f172a' }
          },

        }
      }
    }

  <style>

    .rotating-logo-bg {
      position: absolute;
      opacity: 0.03;
      pointer-events: none;
      animation: rotate 60s linear infinite;
    }
    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }

  </style>
</head>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-16">

          <a href="contact.html" class="text-slate-600 hover:text-primary-600 font-medium">Contact</a>

    </div>

    <!-- Rotating Logo Background -->
    <div class="rotating-logo-bg top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-96 h-96">
      <svg viewBox="0 0 120 120" class="w-full h-full text-white" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="60" cy="60" r="35" fill="currentColor" stroke="currentColor" stroke-width="3"/>

    <div class="max-w-7xl mx-auto px-4 text-center text-sm">
